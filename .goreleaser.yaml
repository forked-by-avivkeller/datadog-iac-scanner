# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: datadog-iac-scanner

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: datadog-iac-scanner
    main: ./cmd/scanner/
    binary: datadog-iac-scanner
    targets:
      - darwin_arm64
      - linux_arm64
      - linux_amd64
      - windows_amd64
    ldflags:
      - -s
      - -w
      - -X github.com/DataDog/datadog-iac-scanner/internal/constants.Version={{ .Version }}
      - -X github.com/DataDog/datadog-iac-scanner/internal/constants.SCMCommit={{ .Commit }}
    env:
      - CGO_ENABLED=0

archives:
  - ids: [datadog-iac-scanner]
    # Like the default template, but without version number
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 \"v1\") }}{{ .Amd64 }}{{ end }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

changelog:
  use: github-native

release:
  draft: true
  prerelease: auto
